<!DOCTYPE html>
<html>

<head>

<title>AI Music Player</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">AI Music Player</div>

<nav>
<a href="#">Home</a>
<a href="#">Contact</a>
</nav>

</header>


<div class="container">

<div class="searchBox">

<input type="text" id="searchInput" placeholder="Search song, artist or mood">

<button id="searchBtn">Search</button>

</div>


<div class="player">

<div id="player"></div>

<h3 id="songTitle">No song playing</h3>

</div>


<div class="section">

<h2>Recent Songs</h2>

<div id="recentSongs"></div>

</div>


<div class="section">

<h2>Recommended</h2>

<div id="recommendedSongs"></div>

</div>

</div>


<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>

</body>
</html>
